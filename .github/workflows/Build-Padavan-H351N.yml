# 修改TNAME: K2P 中的K2P为你需要编译的型号，注意名称要与configs/templates/目录下的名字相同
name: Build-Padavan-H351N

on: 
  workflow_dispatch:
    inputs:
      enable_cups:
        description: '启用 CUPS 打印系统（更大体积）'
        required: false
        default: false
        type: boolean
  
  schedule:
    - cron: '0 0 * * 0'
  
  push:
    tags:
      - 'v*'

env:
  ENABLE_CUPS: ${{ github.event.inputs.enable_cups || 'false' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: Checkout
      uses: actions/checkout@master
      
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install unzip libtool-bin curl cmake gperf gawk flex bison nano xxd fakeroot \
        cpio git python3-docutils gettext automake autopoint texinfo build-essential help2man \
        pkg-config zlib1g-dev libgmp3-dev libmpc-dev libmpfr-dev libncurses5-dev libltdl-dev wget
        
    - name: Clone source code and setup toolchain
      env:
        KERNEL: 3.4
      run: |
        # 克隆源码
        git clone --depth=1 https://github.com/joinme/Padavan-KVR.git /opt/rt-n56u
        
        cd /opt/rt-n56u/toolchain-mipsel
        
        echo "=== 下载工具链 ==="
        # 下载工具链（带重试）
        for i in 1 2 3; do
          if sh dl_toolchain.sh; then
            echo "工具链下载成功"
            break
          fi
          echo "工具链下载失败，重试 $i..."
          sleep 5
        done
        
        echo "=== 工具链目录内容 ==="
        ls -la
        
        # 检查并解压工具链
        if [ ! -d "mipsel-linux-uclibc" ]; then
          echo "查找压缩包..."
          for f in *.tar.gz *.tar.xz *.tar.bz2; do
            if [ -f "$f" ]; then
              echo "解压 $f"
              tar -xf "$f"
              break
            fi
          done
        fi
        
        # 验证工具链
        if [ -d "mipsel-linux-uclibc/bin" ]; then
          echo "=== 工具链已就绪 ==="
          ls -la mipsel-linux-uclibc/bin/mipsel-linux-uclibc-gcc
          ./mipsel-linux-uclibc/bin/mipsel-linux-uclibc-gcc --version
        else
          echo "=== 工具链结构异常 ==="
          find . -name "gcc" -o -name "*uclibc*" | head -10
          exit 1
        fi
        
        # 创建输出目录
        mkdir -p /opt/images/

    - name: Prepare H351N USB Print Config
      run: |
        cd /opt/rt-n56u/trunk/configs/templates

        cat > H351N-USBPRINT.config << 'EOF'
            ### H351N 百米路由器3 USB打印版配置 ###
            CONFIG_PRODUCT="H351N-USBPRINT"
            CONFIG_FIRMWARE_PRODUCT_ID="H351N-USBPRINT"
            CONFIG_FIRMWARE_VERSION="3.4.3.9-099-usbprint"

            ### 平台 ###
            CONFIG_FIRMWARE_CHIP_ID="MT7620A"

            ### 硬件规格 ###
            CONFIG_FIRMWARE_FLASH_SIZE="16"
            CONFIG_FIRMWARE_RAM_SIZE="128"

            ### 无线：仅 2.4G ###
            CONFIG_FIRMWARE_WIFI2_DRIVER="mt7620"
            CONFIG_FIRMWARE_WIFI5_DRIVER=""

            ### 网口 ###
            CONFIG_FIRMWARE_WAN_IFNAME="eth2.2"
            CONFIG_FIRMWARE_LAN_IFNAME="eth2.1"

            ### USB 支持（核心）###
            CONFIG_FIRMWARE_ENABLE_USB=y
            CONFIG_FIRMWARE_ENABLE_USB_PRINTER=y
            CONFIG_FIRMWARE_ENABLE_USB_STORAGE=n
            CONFIG_FIRMWARE_ENABLE_U2EC=y
            CONFIG_FIRMWARE_ENABLE_LPR=y

            ### 打印服务器：p910nd（轻量级）###
            CONFIG_FIRMWARE_ENABLE_P910ND=y

            ### 可选：CUPS（功能更强，体积大）###
            CONFIG_FIRMWARE_ENABLE_CUPS=n
            CONFIG_FIRMWARE_ENABLE_CUPS_BJNP=n

            ### 网络共享（按需启用）###
            CONFIG_FIRMWARE_ENABLE_SMB=n
            CONFIG_FIRMWARE_ENABLE_FTP=n

            ### 禁用其他节省空间 ###
            CONFIG_FIRMWARE_ENABLE_SHADOWSOCKS=n
            CONFIG_FIRMWARE_ENABLE_ADBYBY=n
            CONFIG_FIRMWARE_ENABLE_DDNS=n
            CONFIG_FIRMWARE_ENABLE_UPNP=n

            ### LED 和按键 ###
            CONFIG_FIRMWARE_LED_GPIO="13"
            CONFIG_FIRMWARE_RESET_GPIO="1"
            CONFIG_FIRMWARE_WPS_GPIO="0"
            EOF

        # 如果需要 CUPS，修改配置
        if [ "${{ env.ENABLE_CUPS }}" = "true" ]; then
          sed -i 's/CONFIG_FIRMWARE_ENABLE_CUPS=n/CONFIG_FIRMWARE_ENABLE_CUPS=y/' H351N-USBPRINT.config
          sed -i 's/CONFIG_FIRMWARE_ENABLE_CUPS_BJNP=n/CONFIG_FIRMWARE_ENABLE_CUPS_BJNP=y/' H351N-USBPRINT.config
          sed -i 's/CONFIG_FIRMWARE_ENABLE_P910ND=y/CONFIG_FIRMWARE_ENABLE_P910ND=n/' H351N-USBPRINT.config
          sed -i 's/CONFIG_FIRMWARE_VERSION="3.4.3.9-099-usbprint"/CONFIG_FIRMWARE_VERSION="3.4.3.9-099-cups"/' H351N-USBPRINT.config
        fi

        ls -la H351N-USBPRINT.config

    - name: Prepare H351N Board Support
      run: |
        cd /opt/rt-n56u/trunk/configs/boards

        # 复制基础板级配置
        if [ -d "NEWIFI-MINI" ]; then
          cp -r NEWIFI-MINI H351N-USBPRINT
        elif [ -d "newifi-mini" ]; then
          cp -r newifi-mini H351N-USBPRINT
        else
          echo "查找可用的板级配置..."
          ls -la
          # 使用第一个可用的 MT7620A 配置
          cp -r $(ls -d * | head -1) H351N-USBPRINT
        fi

        cat > H351N-USBPRINT/board.h << 'EOF'
            #ifnd   ef __BOARD_H__
            #define __BOARD_H__

            #define BOARD_PID_NAME          "H351N"
            #define BOARD_PID_INFO          "BaiMi Router 3 USB Print (MT7620A)"
            #define BOARD_BOOT_TIME         30
            #define BOARD_FLASH_TIME        120

            /* GPIO */
            #define BOARD_GPIO_BTN_RESET    1
            #define BOARD_GPIO_BTN_WPS      0
            #define BOARD_GPIO_LED_POWER    13
            #define BOARD_GPIO_LED_WIFI     14
            #define BOARD_GPIO_LED_USB      15

            /* 无线：单频 2.4G */
            #define BOARD_NUM_ANT_5G        0
            #define BOARD_NUM_ANT_2G        2
            #define BOARD_HAS_5G_WLAN       0

            /* USB 打印支持 */
            #define BOARD_HAS_USB           1
            #define BOARD_USB_PORT_SWAP     0
            #define BOARD_USB3_PORT_SWAP    0
            #define BOARD_USB_PRINTER       1

            /* 网口 */
            #define BOARD_NUM_ETH_EPHY      5
            #define BOARD_ETH_ADDR          0x0
            #define BOARD_HAS_EPHY_L1000    0
            #define BOARD_HAS_EPHY_W1000    0

            #endif
            EOF

        ls -la H351N-USBPRINT/

    - name: Disable MT7612E Driver
      run: |
        cd /opt/rt-n56u/trunk

        # 禁用 MT7612E
        find . -path "*/mt76x2/Makefile" -exec sed -i 's/CONFIG_MT7612E_AP=m/CONFIG_MT7612E_AP=n/g' {} \;
        find . -path "*/mt76x2/Makefile" -exec sed -i 's/CONFIG_MT7612E_AP=y/CONFIG_MT7612E_AP=n/g' {} \;

        # 确保 mt7620 启用
        if [ -f linux-3.4.x/.config ]; then
          echo "CONFIG_MT7620_AP=y" >> linux-3.4.x/.config
        fi

    - name: Build Firmware
      env:
        TNAME: H351N-USBPRINT
        KERNEL: 3.4
      run: |
        cd /opt/rt-n56u/trunk
        
        # 设置工具链路径
        export TOOLCHAIN_DIR=/opt/rt-n56u/toolchain-mipsel
        export PATH=$TOOLCHAIN_DIR/mipsel-linux-uclibc/bin:$PATH
        
        echo "=== 环境检查 ==="
        echo "TOOLCHAIN_DIR: $TOOLCHAIN_DIR"
        echo "PATH: $PATH"
        
        # 验证编译器
        echo "=== 验证工具链 ==="
        which mipsel-linux-uclibc-gcc
        mipsel-linux-uclibc-gcc --version
        
        # 检查配置文件
        if [ ! -f configs/templates/$TNAME.config ]; then
          echo "错误: configs/templates/$TNAME.config 不存在"
          ls -la configs/templates/
          exit 1
        fi
        
        # 复制配置
        cp -f configs/templates/$TNAME.config .config
        
        # 清理旧配置项
        sed -i '/CONFIG_FIRMWARE_INCLUDE_TRANSMISSION/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_ARIA/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_ZEROTIER/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_SHADOWSOCKS/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_V2RAY/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_XRAY/d' .config
        sed -i '/CONFIG_FIRMWARE_INCLUDE_TROJAN/d' .config
        sed -i '/CONFIG_PACKAGE_usbprinter/d' .config
        
        # 添加 USB 打印包
        echo "CONFIG_PACKAGE_usbprinter=y" >> .config
        
        echo "=== 最终配置预览 ==="
        grep -E "USB|PRINT|p910nd" .config | head -20
        
        # 清理
        echo "=== 清理编译环境 ==="
        sudo ./clear_tree || true
        
        # 编译（传递环境变量）
        echo "=== 开始编译 ==="
        sudo -E PATH=$PATH TOOLCHAIN_DIR=$TOOLCHAIN_DIR ./build_firmware_modify $TNAME 0 2>&1 | tee build.log &
        
        # 等待编译完成（带超时）
        PID=$!
        TIMEOUT=3600  # 1小时超时
        COUNT=0
        
        while kill -0 $PID 2>/dev/null; do
          sleep 10
          COUNT=$((COUNT + 10))
          if [ $COUNT -ge $TIMEOUT ]; then
            echo "编译超时，终止..."
            kill -9 $PID 2>/dev/null
            exit 1
          fi
          echo "编译进行中... 已等待 $COUNT 秒"
        done
        
        wait $PID
        BUILD_RESULT=$?
        
        # 检查结果
        echo "=== 编译结果检查 ==="
        ls -la images/ 2>/dev/null || true
        
        if [ $BUILD_RESULT -eq 0 ] && [ -f images/*.trx ]; then
          echo "编译成功"
          sudo mv -f images/*.trx /opt/images/
          ls -la /opt/images/
        else
          echo "编译失败 (退出码: $BUILD_RESULT)"
          echo "最后 100 行日志:"
          tail -100 build.log
          
          echo "查找错误信息:"
          grep -E "error:|Error:|ERROR:|No such file|cannot find" build.log | tail -20 || true
          
          exit 1
        fi

    - name: Upload packages
      uses: actions/upload-artifact@master
      if: always()
      with:
        name: Padavan-packages
        path: /opt/images
